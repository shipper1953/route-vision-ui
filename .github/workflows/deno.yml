name: Deno Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Verify Deno installed
        run: deno --version

      - name: Deno format check (Supabase functions)
        run: deno fmt --check supabase/functions
